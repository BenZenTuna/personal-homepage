<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tunas.me / taner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #05060a;
    --fg: #f3efe8;
    --fg-dim: rgba(243, 239, 232, 0.55);
    --fg-faint: rgba(243, 239, 232, 0.18);
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --accent: #a8c3ff;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; overflow:hidden; background:var(--bg); color:var(--fg);
    font-family: var(--mono); font-size: 13px; -webkit-font-smoothing: antialiased; }
  #shader-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; cursor: crosshair; }

  .top {
    position: fixed; top: 0; left: 0; right: 0; padding: 24px 32px;
    display: flex; justify-content: space-between; align-items: flex-start;
    z-index: 20;
  }
  .brand { display: flex; align-items: baseline; gap: 12px; }
  .brand-mark { width: 7px; height: 7px; border-radius: 50%; background: var(--fg);
    box-shadow: 0 0 14px rgba(243,239,232,0.6); transform: translateY(-1px); }
  .brand-name { font-family: 'Caveat', cursive; font-size: 26px; }
  .brand-meta { color: var(--fg-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; }

  .back {
    color: var(--fg-dim); text-decoration: none; font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.25em; display: flex; align-items: center; gap: 10px;
    border: 1px solid var(--fg-faint); padding: 10px 16px; border-radius: 999px;
    background: rgba(5,6,10,0.4); backdrop-filter: blur(8px);
    transition: color 200ms, border-color 200ms, background 200ms;
  }
  .back:hover { color: var(--fg); border-color: rgba(168,195,255,0.5); background: rgba(243,239,232,0.05); }
  .back svg { width: 12px; height: 12px; }

  .stage {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none; text-align: center; padding: 32px;
  }

  .eyebrow {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.4em;
    color: var(--accent); opacity: 0.7; margin-bottom: 28px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::before, .eyebrow::after { content:''; width: 24px; height: 1px; background: var(--accent); opacity: 0.5; }

  .name {
    font-family: 'Caveat', cursive;
    font-size: clamp(72px, 10vw, 172px);
    line-height: 0.9; margin: 0; font-weight: 500;
    color: #e8efff;
    text-shadow: 0 0 60px rgba(168,195,255,0.3);
  }

  .coming-soon {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: clamp(56px, 8vw, 128px);
    line-height: 0.95; margin: 40px 0 0;
    color: var(--fg);
    letter-spacing: -0.02em;
    position: relative;
  }
  .coming-soon em { color: var(--accent); font-style: italic; }

  .sub {
    margin-top: 32px; max-width: 480px;
    color: var(--fg-dim); font-size: 12px; line-height: 1.8;
    letter-spacing: 0.04em;
  }

  /* Orbiting tags below */
  .tags {
    margin-top: 48px; display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
  }
  .tag {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em;
    color: var(--fg-dim);
    padding: 8px 16px; border: 1px solid var(--fg-faint); border-radius: 999px;
    background: rgba(5,6,10,0.4); backdrop-filter: blur(6px);
  }

  /* Corners */
  .corner { position: fixed; width: 20px; height: 20px; z-index: 6; }
  .corner::before, .corner::after { content:''; position:absolute; background: var(--fg-faint); }
  .corner::before { width:100%; height:1px; top:0; }
  .corner::after { width:1px; height:100%; left:0; top:0; }
  .corner.tl { top:16px; left:16px; }
  .corner.tr { top:16px; right:16px; transform: scaleX(-1); }
  .corner.bl { bottom:16px; left:16px; transform: scaleY(-1); }
  .corner.br { bottom:16px; right:16px; transform: scale(-1,-1); }

  .bottom {
    position: fixed; bottom: 24px; left: 32px; right: 32px;
    display: flex; justify-content: space-between; z-index: 20;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.25em; color: var(--fg-dim);
  }
  .bottom .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); margin-right: 8px; animation: pulse 2s ease-in-out infinite; vertical-align: middle; }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  @media (max-width: 720px) {
    .top { padding: 14px 16px; }
    .bottom { left: 16px; right: 16px; flex-direction: column; gap: 6px; }
    .name { font-size: 72px; }
    .coming-soon { font-size: 56px; }
  }
</style>
</head>
<body>

<canvas id="shader-canvas"></canvas>

<div class="top">
  <div class="brand">
    <span class="brand-mark"></span>
    <span class="brand-name">tunas.me</span>
    <span class="brand-meta">/ taner</span>
  </div>
  <a class="back" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
    <span>back</span>
  </a>
</div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="stage">
  <div class="eyebrow">Elder · Cool Silver · 001</div>
  <h1 class="name">Taner</h1>
  <h2 class="coming-soon">coming <em>soon</em></h2>
  <p class="sub">The orbit is forming. A personal page for Taner — notes, work, signals from the field — is under construction.</p>
  <div class="tags">
    <span class="tag">Engineer</span>
    <span class="tag">Constructor</span>
    <span class="tag">Signal</span>
  </div>
</div>

<div class="bottom">
  <div><span class="dot"></span>in orbit · building</div>
  <div>tunas.me / taner &nbsp;·&nbsp; 2026</div>
</div>

<script src="solo-shader.js"></script>
<script>
  try { new window.SoloShader(document.getElementById('shader-canvas'), 'cool'); } catch(e) { console.error(e); }
</script>
</body>
</html>
